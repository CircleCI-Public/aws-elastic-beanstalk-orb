description: >
  Deploy an update to an existing AWS Elastic Beanstalk environment.

parameters:
  application_name:
    description: The name of the application (used during `eb init`).
    type: string
    default: ""
  region:
    type: string
    default: ${AWS_DEFAULT_REGION}
    description: >
      AWS region to deploy app. Defaults to environment variable ${AWS_DEFAULT_REGION}.
  environment_name:
    description: The name of the existing environment (created with `eb create`) to update.
    type: string
    default: ""
  platform_version:
    description: The platform version to use. You can specify a platform, a platform and version, a platform branch, a solution stack name, or a solution stack ARN. Use 'eb platform list' to get a list of available configurations.
    type: string
    default: "node.js 22"
  label:
    description: Specify a label to use for the version that the EB CLI creates. If the label has already been used, the EB CLI redeploys the previous version with that label.
    type: string
    default: ""
  description:
    description: The description for the application version, enclosed in double quotation marks.
    type: string
    default: ""
  app_dir:
    type: string
    default: "."
    description: Path to the directory containing your application source code. My default, the current directory will be used.
  profile_name:
    description:
      "The name of an AWS profile to use with aws-cli commands"
    type: string
    default: 'default'
  executor:
    description: The executor to use for this job. By default, this will use the "default" executor provided by this orb.
    type: executor
    default: default
  auth:
    description: |
      The authentication method used to access your AWS account. Import the aws-cli orb in your config and
      provide the aws-cli/setup command to authenticate with your preferred method. View examples for more information.
    type: steps
  deploy_markers_mode:
    description: >
      Controls CircleCI deploy marker integration via the deploys orb.
      OFF: no deploy markers are created.
      LOG: logs a deployment event after the EB deploy completes.
      PLAN: creates a planned deployment marker before the EB deploy; status updates are left to the caller.
      PLAN_AND_UPDATE: full lifecycle — plan before deploy, mark as running, then set SUCCESS or FAILED after (default).
    type: enum
    enum: [OFF, LOG, PLAN, PLAN_AND_UPDATE]
    default: PLAN_AND_UPDATE
  deploy_markers_deploy_name:
    description: >
      Unique identifier for this deployment within the workflow. Used by PLAN and PLAN_AND_UPDATE modes.
      Must be unique if planning multiple deployments in the same workflow.
    type: string
    default: "deploy"
  deploy_markers_namespace:
    description: >
      Namespace of the deployment shown in the CircleCI Deploys UI.
      Used by LOG, PLAN, and PLAN_AND_UPDATE modes. Defaults to 'default' if not set.
    type: string
    default: ""
  deploy_markers_target_version:
    description: >
      Version identifier shown in the CircleCI Deploys UI.
      Used by LOG, PLAN, and PLAN_AND_UPDATE modes. Defaults to the short commit SHA if not set.
    type: string
    default: ""

executor: << parameters.executor >>

steps:
  - checkout
  - steps: << parameters.auth >>
  - setup
  - when:
      condition:
        or:
          - equal: [<< parameters.deploy_markers_mode >>, "PLAN"]
          - equal: [<< parameters.deploy_markers_mode >>, "PLAN_AND_UPDATE"]
      steps:
        - deploys/plan:
            deploy_name: << parameters.deploy_markers_deploy_name >>
            component_name: << parameters.application_name >>
            environment_name: << parameters.environment_name >>
            namespace: << parameters.deploy_markers_namespace >>
            target_version: << parameters.deploy_markers_target_version >>
  - when:
      condition:
        equal: [<< parameters.deploy_markers_mode >>, "PLAN_AND_UPDATE"]
      steps:
        - deploys/update_status:
            deploy_name: << parameters.deploy_markers_deploy_name >>
            status: RUNNING
            when: always
  - run:
      name: EB Deploy
      working_directory: << parameters.app_dir >>
      environment:
        ORB_STR_APPLICATION_NAME: << parameters.application_name >>
        ORB_STR_REGION: << parameters.region >>
        ORB_STR_PLATFORM_VERSION: << parameters.platform_version >>
        ORB_STR_ENVIRONMENT_NAME: << parameters.environment_name >>
        ORB_STR_LABEL: << parameters.label >>
        ORB_STR_DESCRIPTION: << parameters.description >>
        ORB_STR_PROFILE_NAME: << parameters.profile_name >>
      command: << include(scripts/deploy.sh) >>
  - when:
      condition:
        equal: [<< parameters.deploy_markers_mode >>, "LOG"]
      steps:
        - deploys/log:
            component_name: << parameters.application_name >>
            environment_name: << parameters.environment_name >>
            namespace: << parameters.deploy_markers_namespace >>
            target_version: << parameters.deploy_markers_target_version >>
  - when:
      condition:
        equal: [<< parameters.deploy_markers_mode >>, "PLAN_AND_UPDATE"]
      steps:
        - deploys/update_status:
            deploy_name: << parameters.deploy_markers_deploy_name >>
            status: SUCCESS
            when: on_success
        - deploys/update_status:
            deploy_name: << parameters.deploy_markers_deploy_name >>
            status: FAILED
            when: on_fail
